<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/main.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css">

    <!-- responsividade
    <link rel="stylesheet" href="./style/responsive.css"> -->

    <!--owl CSS-->

    <title>NETFLIX CLONE</title>

<body>
    <header>
        <div class="container u-flex u-flex-center u-flex-between">
            <h2 class="logo u-text-red u-font-black u-size-40 u-margin-l-5">NETFLIX</h2>
            <nav aria-label="Navegação principal" class="u-flex">
                <a href="#" class="u-margin-r-10">Inicio</a>

            </nav>
        </div>
    </header>

    <main>
        <div class="filme-principal u-flex u-flex-column u-flex-justify-center">
            <div class="container u-w-70">
                <h3 class="titulo u-size-40 u-font-trebuchet u-margin-t-15p">HOUSE OF CARDS</h3>
                <p class="descricao u-margin-t-10 u-margin-b-40">Nada pode impedir o político sem escrúpulos Frank Underwood de conquistar Washington. Assista agora a nova temporada de House of Cards que está imperdível.</p>
                </p>

                <div class="botoes u-flex">
                    <button class="botao u-margin-r-15">
                        <i class="pi pi-play" aria-hidden="true"></i>ASSISTIR AGORA
                    </button>

                    <button class="botao">
                        <i class="pi pi-info-circle" aria-hidden="true"></i>MAIS INFORMAÇÕES
                    </button>
                </div>
            </div>
        </div>
    </main>
